      - institution: "Stellenbosch University"
        area: "Electronic Engineering"
        studyType: "PhD."
        start_date: "2024"
        end_date: "2026"
        courses: "Title: Diagnostics of indoor air environmental exposures and climate-infrastructure vulnerability in South African schools."
        highlights:
          - "Conferred March 2026"

      - institution: "Stellenbosch University"
        area: "Electronic Engineering"
        studyType: "MEng."
        start_date: "2022"
        end_date: "2023"
        courses: "Focus: Engineering of the LoRaWAN indoor air quality sensing network used for subsequent doctoral study."
        highlights:
          - "Upgraded to PhD"

      - institution: "Stellenbosch University"
        area: "Electrical and Electronic Engineering"
        studyType: "BEng."
        start_date: "2018"
        end_date: "2021"
        courses: "Specialisation: Robotics and electromagnetics."
        highlights:
          - "Conferred December 2021"
          - "Capstone project (Distinction, 85%): Designed and deployed a P2P LoRa-based water level monitoring system solution for low-resource farms."
          - "Delivered a full-stack solution encompassing circuit/RF design, custom PCB assembly, firmware, and a local monitoring dashboard."
          - "System operated independently of electricity or network coverage."

    Experience:
      - company: "Stellenbosch University"
        position: "Doctoral researcher (Data systems and policy)"
        start_date: "2024"
        end_date: "2026"
        highlights:
          - "Statistical engineering and data analytics: Established a robust data-to-policy framework to quantify infrastructure risk, using Python (SALib) to run Global Sensitivity Analysis (GSA) on a 2.8M+ vector longitudinal dataset and identify key drivers of climate vulnerability."
          - "Stakeholder management and technical communication: Translated technical diagnostics into actionable guidelines for the City of Cape Town (Environmental Health Dept.) and national media, managing the interface with non-technical decision-makers."
          - "Infrastructure optimisation and project outputs: Developed a cost-benefit framework for building retrofits to reduce climate-vulnerability of infrastructure."
          - "This directly justified and resulted in capital upgrades (roof retrofitting) in public sector school buildings."
          - "Regulatory compliance: Benchmarked indoor environmental quality and sensing device performance against local and international standards (ISO, ASHRAE, WHO, SANS)."

      - company: "Stroom Cargo"
        position: "Lead telemetry and embedded engineer [Contract basis]"
        start_date: "2026"
        end_date: "present"
        highlights:
          - "E-bike telemetry architecture: Directed the ground-up conceptualisation and stakeholder management for a custom cargo e-bike tracking and battery health management system."
          - "Full-stack IoT implementation: Designing complete PCB architectures in Altium for GPS logging and motor control, and engineering the device-to-cloud communication pipeline via 1NCE, AWS, and Grafana for mass fleet monitoring and management."

      - company: "Fibertime"
        position: "Lead embedded hardware engineer [Contract basis]"
        start_date: "2026"
        end_date: "present"
        highlights:
          - "Scalable security infrastructure: Leading the end-to-end productisation of a home alarm system for mass residential rollout in townships."
          - "Hardware and firmware design: Executing comprehensive hardware development (component selection, PCB design, prototyping, debugging) and writing embedded firmware with MQTT cloud integration to enable remote state management via WhatsApp."

      - company: "Stellenbosch University"
        position: "Specialised sensing consultant [Project basis, custom IoT solutions]"
        start_date: "2023"
        end_date: "2024"
        highlights:
          - "Mining sector (Saldanha): Designed and deployed custom SD-card-based particulate matter (PM) sensors for air quality compliance monitoring in Saldanha active mining zones."
          - "Environmental research (Forestry): Developed and manufactured custom solar-powered LoRaWAN anemometers to monitor canopy wind dynamics in Coetzenburg Forest."
          - "Residential air monitoring: Designed a LoRaWAN household air pollution sensing network and deployed it in households to quantify health risks from amenity fireplace usage in winter."

      - company: "University of Alicante"
        position: "Visiting research collaborator (EU Horizon project)"
        start_date: "2023-05-01"
        end_date: "2023-07-01"
        highlights:
          - "Project REMARKABLE: Rural Environmental Monitoring via Ultra-wide-area Networks."
          - "Coordinated technical alignment on ultra-wide area networks between African and European research teams as the South African representative for Work Packages 3 and 4."
          - "System validation (Resource-constrained environments): Validated frugal IoT sensor solutions designed for harsh operating conditions, ensuring performance met contextual, specific constraint criteria."
          - "Knowledge integration and output: Worked to bridge the contextual gap between African and European sensing applications, resulting in the co-authorship of a conference paper."

      - company: "Stellenbosch University"
        position: "Postgraduate researcher (MEng)"
        start_date: "2022"
        end_date: "2023"
        highlights:
          - "Full-stack IoT development: Designed, developed, and deployed a proprietary LoRaWAN sensor node from concept to mass production."
          - "Executed RF matching, custom PCB design, and mechanical enclosure modelling for high-reliability deployment."
          - "Manufacturing lifecycle: Managed the transition from in-house prototyping (SMD soldering, PCB milling) to outsourced volume manufacturing for at-scale deployment."
          - "Network operations: Directed the physical deployment and maintenance of the sensor fleet across multiple sites, optimising gateway uptime and power management for a 24-month data collection period."
          - "Dataset engineering: Engineered data pipelines for the cleaning, validation, and metadata mapping of high-frequency telemetry."
          - "Observational analysis: Provided an evidence base of indoor air environmental exposures in different infrastructure buildings, quantifying exposure levels and severity."
          - "Compliance benchmarking: Conducted baseline environmental auditing, quantifying health, comfort, and cognition risks in educational infrastructure by benchmarking real-world sensor data against building and environmental standards (SANS, WHO, ASHRAE, ISO), forming the basis for subsequent retrofitting strategies."

      - company: "Stellenbosch University"
        position: "Assistant lecturer (Analogue electronics)"
        start_date: "2022"
        end_date: "2022"
        summary: "Module: Design (E) 344 (Analogue design)"
        highlights:
          - "Technical leadership: Managed curriculum delivery and practical assessments for 110+ undergraduate students, focusing on the design of object-avoiding autonomous vehicles."
          - "Mentorship and debugging: Provided support for circuit debugging, designed PCBs for the project, and designed and built test benches for the analogue control systems and circuitry."
          - "Team management: Coordinated a team of student assistants (demis) to manage workload distribution, assessment design, and semester planning."

      - company: "South African National Space Agency (SANSA)"
        position: "Space weather apprentice"
        start_date: "2022-06-01"
        end_date: "2022-07-01"
        highlights:
          - "International collaboration: Selected for the International Space Weather Camp 2022, with lectures from space agencies from USA, Germany, and South Africa, gaining practical insight into satellite communications and space weather physics."
          - "Completed the practical leg of the space weather camp at the South African National Space Agency (SANSA), with international legs cancelled due to Covid-19 restrictions on international travel."
          - "SDR development: Collaborated with team to build a Software Defined Radio (SDR) capable of capturing live image data from NOAA satellites."

      - company: "Divigraph (Pty) Ltd."
